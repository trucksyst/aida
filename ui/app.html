<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDA — AI Dispatcher</title>
    <link rel="stylesheet" href="lib/leaflet.css">
    <link rel="stylesheet" href="components/styles.css">
    <script src="data/locations.js"></script>
</head>

<body>

    <div id="aida-app">

        <!-- ======================================================
         Sidebar — навигация (50px)
    ====================================================== -->
        <nav id="sidebar">
            <button class="sidebar-icon active" data-section="search" title="Search loads">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <span class="tooltip">Search</span>
            </button>
            <button class="sidebar-icon" data-section="bookmarks" title="Bookmarks">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
                </svg>
                <span class="tooltip">Bookmarks</span>
            </button>
            <button class="sidebar-icon" data-section="history" title="Call history">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 6v6l4 2" />
                </svg>
                <span class="tooltip">History</span>
            </button>
            <button class="sidebar-icon" data-section="agent" title="OpenClaw Agent">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="8" width="16" height="12" rx="2" />
                    <path d="M12 8V4M9 13v2M15 13v2" />
                </svg>
                <span class="tooltip">Agent</span>
            </button>
            <button class="sidebar-icon" data-section="settings" title="Settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <path d="M4 21v-7m0-4V3M12 21v-9m0-4V3M20 21v-5m0-4V3M1 14h6M9 8h6M17 16h6" />
                </svg>
                <span class="tooltip">Settings</span>
            </button>

            <div class="sidebar-spacer"></div>

            <button class="sidebar-icon" id="btn-theme" title="Theme">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor" />
                </svg>
                <span class="tooltip">Theme</span>
            </button>
        </nav>

        <!-- ======================================================
         Main content
    ====================================================== -->
        <div id="content-wrap">
            <main id="content">

                <!-- Section: Поиск грузов -->
                <div id="section-search" class="section-content">

                    <!-- Search Panel -->
                    <div id="search-panel">
                        <div class="search-field field-origin wrap-autocomplete">
                            <input type="text" id="origin-city" placeholder=" " autocomplete="off">
                            <label for="origin-city">Origin</label>
                            <div id="origin-autocomplete" class="location-autocomplete" role="listbox"
                                aria-hidden="true">
                            </div>
                        </div>
                        <div class="search-field field-radius">
                            <input type="number" id="search-radius" placeholder=" " min="0" max="500" value="50">
                            <label for="search-radius">Radius</label>
                        </div>

                        <div class="search-field field-dest wrap-autocomplete">
                            <input type="text" id="dest-city" placeholder=" " autocomplete="off">
                            <label for="dest-city">Destination</label>
                            <div id="dest-autocomplete" class="location-autocomplete" role="listbox" aria-hidden="true">
                            </div>
                        </div>
                        <div class="search-field field-radius">
                            <input type="number" id="dest-radius" placeholder=" " min="0" max="500" value="150">
                            <label for="dest-radius">Radius</label>
                        </div>

                        <div class="search-field field-equip">
                            <label>Type</label>
                            <div class="equip-multi" id="equip-multi">
                                <div class="equip-display" id="equip-display">(V)</div>
                                <div class="equip-dropdown" id="equip-dropdown">
                                    <label><input type="checkbox" value="VAN" checked> Van (V)</label>
                                    <label><input type="checkbox" value="REEFER"> Reefer (R)</label>
                                    <label><input type="checkbox" value="FLATBED"> Flatbed (F)</label>
                                    <label><input type="checkbox" value="STEPDECK"> Step Deck (SD)</label>
                                    <label><input type="checkbox" value="DOUBLEDROP"> Double Drop (DD)</label>
                                    <label><input type="checkbox" value="LOWBOY"> Lowboy (LB)</label>
                                    <label><input type="checkbox" value="RGN"> RGN (RG)</label>
                                    <label><input type="checkbox" value="HOPPER"> Hopper Bottom (HB)</label>
                                    <label><input type="checkbox" value="TANKER"> Tanker (T)</label>
                                    <label><input type="checkbox" value="POWERONLY"> Power Only (PO)</label>
                                    <label><input type="checkbox" value="CONTAINER"> Container (C)</label>
                                    <label><input type="checkbox" value="DUMP"> Dump Trailer (DT)</label>
                                    <label><input type="checkbox" value="AUTOCARRIER"> Auto Carrier (AC)</label>
                                    <label><input type="checkbox" value="LANDOLL"> Landoll (LA)</label>
                                    <label><input type="checkbox" value="MAXI"> Maxi (MX)</label>
                                </div>
                            </div>
                        </div>

                        <div class="search-field field-date">
                            <input type="date" id="date-from" placeholder=" ">
                            <label for="date-from">From</label>
                        </div>
                        <div class="search-field field-date">
                            <input type="date" id="date-to" placeholder=" ">
                            <label for="date-to">To</label>
                        </div>
                        <div class="search-field field-weight">
                            <input type="number" id="max-weight" placeholder=" " min="0" max="200000" step="1000">
                            <label for="max-weight">Weight</label>
                        </div>

                        <!-- Search Presets -->
                        <div class="search-presets search-field" id="search-presets">
                            <label class="preset-label">Saved Searches</label>
                            <div class="preset-display" id="preset-trigger" title="Click to open saved presets">
                                <span class="preset-display-text" id="preset-display-text">Select or type params…</span>
                                <svg class="preset-caret" width="10" height="10" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path d="M7 10l5 5 5-5z" />
                                </svg>
                            </div>
                            <div class="preset-dropdown" id="preset-dropdown">
                                <div class="preset-list" id="preset-list">
                                    <!-- Filled by JS -->
                                </div>
                                <div class="preset-empty" id="preset-empty">No saved presets</div>
                            </div>
                        </div>

                        <button class="preset-save-btn" id="preset-save-btn" title="Save current search as preset">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                                <polyline points="17 21 17 13 7 13 7 21" />
                                <polyline points="7 3 7 8 15 8" />
                            </svg>
                        </button>

                        <button class="btn-search" id="btn-search">Search</button>

                        <div class="col-config-wrap">
                            <button class="col-config-btn" id="col-config-btn" title="Configure columns">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3" />
                                    <path
                                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                                </svg>
                            </button>
                            <div class="col-config-panel" id="col-config-panel">
                                <!-- Filled by JS -->
                            </div>
                        </div>
                    </div>

                    <!-- Table area -->
                    <div id="table-area">
                        <!-- Frozen header (живёт вне scroll-контейнера, скроллится только X) -->
                        <div id="table-header-wrap">
                            <table id="load-table-header">
                                <thead>
                                    <tr id="thead-row">
                                        <!-- Generated dynamically by JS (Column Manager) -->
                                    </tr>
                                </thead>
                            </table>
                        </div>
                        <!-- Body (скроллится Y и X) -->
                        <div id="load-table-wrap">
                            <table id="load-table">
                                <colgroup id="load-colgroup"></colgroup>
                                <tbody id="loads-tbody">
                                    <!-- Заполняется из JS -->
                                </tbody>
                            </table>
                            <div class="table-empty" id="table-empty" style="display:none">
                                <div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <path
                                            d="m16.5 9.4-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                        <path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12" />
                                    </svg></div>
                                <div class="msg">No loads. Enter params and click Search.</div>
                            </div>
                            <div id="load-more-spinner" class="load-more-spinner" style="display:none">
                                <div class="spinner-dots"><span></span><span></span><span></span></div>
                                <span>Loading more…</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Закладки -->
                <div id="section-bookmarks" class="section-content" style="display:none">
                    <div class="section-title">Bookmarks</div>
                    <div class="section-body" id="bookmarks-body">
                        <!-- Заполняется из JS -->
                    </div>
                </div>

                <!-- Section: История -->
                <div id="section-history" class="section-content" style="display:none">
                    <div class="section-title">Call History</div>
                    <div class="section-body" id="history-body">
                        <!-- Заполняется из JS -->
                    </div>
                </div>

                <!-- Section: Агент -->
                <div id="section-agent" class="section-content" style="display:none">
                    <div class="section-title">OpenClaw Agent</div>
                    <div class="section-body">
                        <div class="agent-toggle">
                            <span class="agent-toggle-label">Agent active</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="agent-toggle">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="settings-group">
                            <h3>Connection</h3>
                            <div class="settings-row">
                                <label>Server URL</label>
                                <input type="text" id="openclaw-url" placeholder="http://localhost:3000">
                            </div>
                            <div class="settings-row">
                                <label>API Key (optional)</label>
                                <input type="text" id="openclaw-key" placeholder="Empty = no auth">
                            </div>
                            <div class="settings-row">
                                <label>Polling interval (ms)</label>
                                <input type="number" id="openclaw-interval" value="5000" min="1000" max="60000">
                            </div>
                            <button class="btn-save-settings" id="btn-save-openclaw">Save</button>
                        </div>
                        <div id="agent-status-block"
                            style="margin-top:12px; font-size:12px; color:var(--text-secondary);">
                            Status: <span id="agent-status-text">Off</span>
                        </div>
                    </div>
                </div>

                <!-- Section: Настройки -->
                <div id="section-settings" class="section-content" style="display:none">
                    <div class="section-title">Settings</div>
                    <div class="section-body">
                        <div class="settings-group">
                            <h3>Company / Dispatcher</h3>
                            <div class="settings-row">
                                <label>Dispatcher name</label>
                                <input type="text" id="set-name" placeholder="John Smith">
                            </div>
                            <div class="settings-row">
                                <label>Company</label>
                                <input type="text" id="set-company" placeholder="Smith Trucking LLC">
                            </div>
                            <div class="settings-row">
                                <label>Phone</label>
                                <input type="text" id="set-phone" placeholder="+1 (630) 555-0100">
                            </div>
                            <div class="settings-row">
                                <label>Email</label>
                                <input type="email" id="set-email" placeholder="dispatch@company.com">
                            </div>
                        </div>
                        <div class="settings-group">
                            <h3>Retell AI</h3>
                            <div class="settings-row">
                                <label>Retell API Key</label>
                                <input type="text" id="set-retell-key" placeholder="key_...">
                            </div>
                            <div class="settings-row">
                                <label>From Number</label>
                                <input type="text" id="set-retell-from" placeholder="+16305550100">
                            </div>
                            <div class="settings-row">
                                <label>Agent ID (optional)</label>
                                <input type="text" id="set-retell-agent" placeholder="agent_...">
                            </div>
                        </div>
                        <button class="btn-save-settings" id="btn-save-settings">Save settings</button>
                    </div>
                </div>

                <!-- Status Bar -->
                <footer id="status-bar">
                    <button class="board-toggle" id="board-btn-dat" data-board="dat" title="DAT — click to toggle">
                        <span class="board-dot"></span>
                        <span class="board-label">DAT</span>
                    </button>
                    <button class="board-toggle" id="board-btn-truckstop" data-board="truckstop"
                        title="Truckstop — click to toggle">
                        <span class="board-dot"></span>
                        <span class="board-label">Truckstop</span>
                    </button>
                    <button class="board-toggle" id="board-btn-tp" data-board="tp"
                        title="TruckerPath — click to toggle">
                        <span class="board-dot"></span>
                        <span class="board-label">TruckerPath</span>
                    </button>
                    <button class="board-toggle" id="board-btn-123lb" data-board="123lb"
                        title="123LB — click to toggle">
                        <span class="board-dot"></span>
                        <span class="board-label">123LB</span>
                    </button>
                    <div class="status-item" id="status-count">
                        <span>—</span>
                    </div>
                    <div class="status-item" id="status-new"
                        style="display:none;cursor:pointer;color:#16a34a;font-weight:600" title="Click to refresh">
                        <span></span>
                    </div>
                    <div class="status-item" id="status-updated" style="margin-left:auto">
                        <span></span>
                    </div>
                    <div class="status-item" id="status-agent">
                        <span>Agent: off</span>
                    </div>
                    <div class="status-item" id="status-build" style="font-size:10px;opacity:0.5">
                    </div>
                </footer>

            </main>

            <!-- ======================================================
         Detail Panel (сдвигает контент)
    ====================================================== -->
            <aside id="detail-panel">
                <div class="detail-header">
                    <h2 id="detail-title">Load details</h2>
                    <button class="detail-close" id="btn-detail-close">✕</button>
                </div>
                <div class="detail-body" id="detail-body">
                    <div id="detail-map" class="detail-map"></div>
                    <!-- Остальное заполняется из JS -->
                </div>
                <div class="detail-actions">
                    <button class="btn btn-action" id="detail-btn-call">Call</button>
                    <button class="btn btn-action" id="detail-btn-email">Email</button>
                    <button class="btn btn-action" id="detail-btn-save">Save</button>
                </div>
            </aside>
        </div>

    </div>

    <!-- AI Chat Widget -->
    <div id="ai-chat-widget">
        <button id="ai-chat-fab" title="AI Assistant" aria-label="Open AI chat">
            <img src="icons/aida-droid.svg" alt="AIDA Droid">
        </button>
        <div id="ai-chat-panel" aria-hidden="true">
            <div id="ai-chat-header">
                <span>AI Assistant</span>
                <div id="ai-chat-header-actions">
                    <button id="ai-chat-clear" title="Очистить чат" aria-label="Очистить чат">⟲</button>
                    <button id="ai-chat-close" title="Close" aria-label="Закрыть чат">✕</button>
                </div>
            </div>
            <div id="ai-chat-auth" style="display:none;">
                <div id="ai-chat-auth-text">Требуется авторизация для чата</div>
            </div>
            <div id="ai-chat-messages"></div>
            <div id="ai-chat-input-wrap">
                <input id="ai-chat-input" type="text" placeholder="Напишите запрос: например 'найди реф из Чикаго'">
                <button id="ai-chat-send" type="button">Send</button>
            </div>
            <div id="ai-chat-resize-handle" aria-hidden="true"></div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="lib/leaflet.js"></script>
    <script src="app.js" type="module"></script>

</body>

</html>
